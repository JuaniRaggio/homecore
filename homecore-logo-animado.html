<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HomeCore — Logo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #061020;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 32px;
  }

  /* ── Hexágono ── */
  .hex-wrap {
    opacity: 0;
    transform: translateX(-28px);
    animation: slideIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
  }

  /* ── Texto ── */
  .text-wrap {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .wordmark {
    opacity: 0;
    transform: translateX(-18px);
    animation: slideIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.35s forwards;
    font-size: 56px;
    font-weight: 500;
    letter-spacing: -2.5px;
    line-height: 1;
    color: white;
  }

  .wordmark span {
    color: #85B7EB;
  }

  .subtitle-wrap {
    opacity: 0;
    transform: translateX(-12px);
    animation: slideIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.55s forwards;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .subtitle {
    font-size: 11px;
    letter-spacing: 5px;
    color: #378ADD;
    font-weight: 400;
  }

  .accent-line {
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, #378ADD, #85B7EB);
    border-radius: 1px;
    animation: expandLine 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.85s forwards;
  }

  /* ── SVG internos ── */
  .hex-outer {
    opacity: 0;
    animation: fadeUp 0.5s ease 0.1s forwards;
  }
  .hex-inner {
    opacity: 0;
    animation: fadeUp 0.5s ease 0.25s forwards;
  }
  .house-roof {
    opacity: 0;
    transform-origin: 54px 17px;
    transform: scaleY(0);
    animation: dropDown 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s forwards;
  }
  .house-walls {
    opacity: 0;
    stroke-dasharray: 220;
    stroke-dashoffset: 220;
    animation: drawPath 0.6s ease 0.65s forwards;
  }
  .house-door {
    opacity: 0;
    transform: scaleY(0);
    transform-origin: 54px 76px;
    animation: fadeUp 0.3s ease 0.9s forwards;
  }
  .wifi-arc-1 {
    opacity: 0;
    stroke-dasharray: 60;
    stroke-dashoffset: 60;
    animation: drawArc 0.4s ease 1.0s forwards;
  }
  .wifi-arc-2 {
    opacity: 0;
    stroke-dasharray: 45;
    stroke-dashoffset: 45;
    animation: drawArc 0.4s ease 1.1s forwards;
  }
  .wifi-arc-3 {
    opacity: 0;
    stroke-dasharray: 30;
    stroke-dashoffset: 30;
    animation: drawArc 0.4s ease 1.2s forwards;
  }
  .wifi-dot {
    opacity: 0;
    transform: scale(0);
    transform-origin: 54px 81px;
    animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) 1.3s forwards;
  }

  /* ── Keyframes ── */
  @keyframes slideIn {
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes expandLine {
    to { width: 64px; }
  }
  @keyframes fadeUp {
    to { opacity: 1; transform: none; }
  }
  @keyframes dropDown {
    to { opacity: 1; transform: scaleY(1); }
  }
  @keyframes drawPath {
    to { opacity: 0.95; stroke-dashoffset: 0; }
  }
  @keyframes drawArc {
    to { opacity: 1; stroke-dashoffset: 0; }
  }
  @keyframes popIn {
    to { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>
  <div class="logo-wrap">

    <!-- Ícono hexagonal -->
    <div class="hex-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 125" width="108" height="125">
        <polygon class="hex-outer" points="54,0 108,31 108,93 54,124 0,93 0,31"
          fill="#0C447C" stroke="#378ADD" stroke-width="1.2"/>
        <polygon class="hex-inner" points="54,9 100,34 100,90 54,115 8,90 8,34"
          fill="none" stroke="#185FA5" stroke-width="0.7"/>
        <polygon class="house-roof" points="54,17 98,40 10,40"
          fill="#378ADD"/>
        <polygon class="house-walls" points="54,22 80,46 80,76 28,76 28,46"
          fill="none" stroke="#B5D4F4" stroke-width="1.8" stroke-linejoin="round"/>
        <rect class="house-door" x="44" y="56" width="20" height="20" rx="3" fill="#042C53"/>
        <path class="wifi-arc-1" d="M 36,67 A 18,18 0 0,1 72,67"
          fill="none" stroke="#85B7EB" stroke-width="1.2" opacity="0.4"/>
        <path class="wifi-arc-2" d="M 41,73 A 13,13 0 0,1 67,73"
          fill="none" stroke="#85B7EB" stroke-width="1.2" opacity="0.65"/>
        <path class="wifi-arc-3" d="M 46,79 A 8,8 0 0,1 62,79"
          fill="none" stroke="#85B7EB" stroke-width="1.2" opacity="0.9"/>
        <circle class="wifi-dot" cx="54" cy="81" r="2.8" fill="#378ADD"/>
      </svg>
    </div>

    <!-- Wordmark + subtítulo -->
    <div class="text-wrap">
      <div class="wordmark">Home<span>Core</span></div>
      <div class="subtitle-wrap">
        <div class="subtitle">SMART HOME PLATFORM</div>
        <div class="accent-line"></div>
      </div>
    </div>

  </div>
</body>
</html>
